<div class="details-overlay" (click)="close()" role="dialog" aria-modal="true" aria-labelledby="media-item-details-title">
  <section class="details-shell" (click)="$event.stopPropagation()">
    <button type="button" class="close-button" (click)="close()" aria-label="Close media item details">
      Close
    </button>

    <div class="details-hero">
      <div class="poster-frame">
        <img
          [src]="item().poster || 'https://placehold.co/360x540?text=No+Poster'"
          [alt]="item().title"
        />
      </div>

      <div class="hero-copy">
        <p class="eyebrow">{{ detailTitle() }}</p>
        <h2 id="media-item-details-title">{{ item().title }}</h2>

        <div class="fact-list" *ngIf="summaryFacts().length">
          <span class="fact-chip" *ngFor="let fact of summaryFacts()">
            <strong>{{ fact.label }}</strong>
            <span>{{ fact.value }}</span>
          </span>
        </div>

        <p class="plot-copy" *ngIf="item().plot; else noPlot">
          {{ item().plot }}
        </p>

        <ng-template #noPlot>
          <p class="plot-copy empty-copy">No plot summary is available for this title yet.</p>
        </ng-template>
      </div>
    </div>

    <div class="detail-grid" *ngIf="detailGroups().length">
      <article class="detail-card" *ngFor="let detail of detailGroups()">
        <p class="detail-label">{{ detail.label }}</p>
        <p class="detail-value">
          <ng-container *ngIf="detail.label === 'Released' && item().released; else rawValue">
            {{ item().released | date: 'MMMM d, y' }}
          </ng-container>
          <ng-template #rawValue>{{ detail.value }}</ng-template>
        </p>
      </article>
    </div>
  </section>
</div>
