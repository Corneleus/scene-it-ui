<div class="overlay" (click)="onClose()" role="dialog" aria-modal="true" aria-label="Add movie">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="search-row">
      <input #searchInput [formControl]="movieForm.controls.title" placeholder="Search by title" />
      <button type="button" (click)="onSearch()" [disabled]="searchInFlight() || addInFlightId() !== null">
        {{ searchInFlight() ? 'Searching...' : 'Search' }}
      </button>
    </div>

    @if (searchMessage()) {
      <p class="status-message">{{ searchMessage() }}</p>
    }

    @if (searchResults().length) {
      <section class="results">
        <h3>Search Results</h3>

        <div class="results-list">
          @for (result of searchResults(); track result.imdbId) {
            <article class="result-card">
              <img [src]="result.poster || 'https://placehold.co/96x140?text=No+Poster'" [alt]="result.title" />

              <div class="result-copy">
                <h4>{{ result.title }}</h4>
                <p>{{ result.year || 'Unknown year' }}</p>
                <p>{{ result.type || 'Movie' }}</p>
              </div>

              <button
                type="button"
                class="add-result-button"
                (click)="addMovieFromResult(result)"
                [disabled]="addInFlightId() === result.imdbId || searchInFlight()"
              >
                {{ addInFlightId() === result.imdbId ? 'Adding...' : 'Add' }}
              </button>
            </article>
          }
        </div>
      </section>
    }
  </div>
</div>
