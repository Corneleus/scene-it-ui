<div class="movies-page">
  <section class="page-hero">
    <p class="eyebrow">Collection</p>
    <h1>Movie Library</h1>
    <p class="page-copy">
      Browse your catalog, review poster art, and manage titles from one clean workspace.
    </p>
  </section>

  <section class="content-panel">
    <div class="panel-toolbar">
      <div>
        <h2>All Movies</h2>
        <p>{{ movies().length }} titles currently loaded</p>
      </div>
      <app-add-movie (movieAdded)="handleMovieAdded($event)"></app-add-movie>
    </div>

    <p class="status-copy" *ngIf="deleteInProgress()">Updating movie selection...</p>
    <p
      class="status-copy"
      [class.error]="feedbackTone() === 'error'"
      [class.success]="feedbackTone() === 'success'"
      *ngIf="feedbackMessage()">
      {{ feedbackMessage() }}
    </p>

    <app-movie-table
      [movies]="movies()"
      [deleting]="deleteInProgress()"
      (detailsRequested)="showMovieDetails($event)"
      (softDeleteRequested)="softDeleteMovies($event)"
      (hardDeleteRequested)="hardDeleteMovies($event)">
    </app-movie-table>
  </section>

  <app-movie-details-modal
    *ngIf="detailsMovie()"
    [movie]="detailsMovie()!"
    (closed)="closeMovieDetails()">
  </app-movie-details-modal>
</div>
