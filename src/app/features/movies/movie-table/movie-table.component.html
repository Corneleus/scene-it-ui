<table class="table table-dark movie-table">
  <thead>
    <tr>
      <th></th> <!-- Checkbox column -->
      <th>Poster</th>
      <th>
        <button type="button" class="sort-button" (click)="setSort('title')">
          Title <span>{{ getSortIndicator('title') }}</span>
        </button>
      </th>
      <th>
        <button type="button" class="sort-button" (click)="setSort('genre')">
          Genre <span>{{ getSortIndicator('genre') }}</span>
        </button>
      </th>
      <th>
        <button type="button" class="sort-button" (click)="setSort('year')">
          Year <span>{{ getSortIndicator('year') }}</span>
        </button>
      </th>
      <th>
        <button type="button" class="sort-button" (click)="setSort('rated')">
          Rated <span>{{ getSortIndicator('rated') }}</span>
        </button>
      </th>
      <th>Details</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let movie of sortedMovies()"
        (click)="selectMovie(movie)"
        [class.selected]="isSelected(movie)">
      
      <!-- Multi-select checkbox -->
      <td>
        <input type="checkbox"
               [checked]="isSelected(movie)"
               (click)="$event.stopPropagation(); selectMovie(movie)" />
      </td>

      <td><img [src]="movie.poster" [alt]="movie.title" class="poster"/></td>
      <td>{{ movie.title }}</td>
      <td>{{ movie.genre }}</td>
      <td>{{ movie.year }}</td>
      <td>{{ movie.rated }}</td>
      <td>
        <button type="button" class="details-button" (click)="$event.stopPropagation(); openDetails(movie)">
          View Details
        </button>
      </td>
    </tr>
  </tbody>
</table>

<!-- Selected Movies Panel -->
<div class="mt-3" *ngIf="selectedMovies().length > 0">
  <h5>Selected Movies</h5>
  <ul>
    <li *ngFor="let movie of selectedMovies()">{{ movie.title }} ({{ movie.year }})</li>
  </ul>
  <div class="selection-actions">
    <button type="button" class="action-button" (click)="clearSelection()" [disabled]="deleting()">Clear All</button>
    <button type="button" class="action-button soft-delete-button" (click)="requestSoftDelete()" [disabled]="deleting()">
      Soft Delete Selected
    </button>
    <button type="button" class="action-button hard-delete-button" (click)="requestHardDelete()" [disabled]="deleting()">
      Hard Delete Selected
    </button>
  </div>
</div>
