<!-- src/app/features/movies/movies.page.html -->
<!-- Table view for movies -->

<div If="loading">Loading movies...</div>
<div If="error" class="error">{{ error }}</div>

<table *ngIf="!loading && !error">
  <thead>
    <tr>
      <th>Title</th>
      <th>Year</th>
      <th>Genre</th>
      <th>Director</th>
      <th>Actors</th>
      <th>Plot</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let movie of movies">
      <td>{{ movie.title }}</td>
      <td>{{ movie.year }}</td>
      <td>{{ movie.genre }}</td>
      <td>{{ movie.director }}</td>
      <td>{{ movie.actors }}</td>
      <td>{{ movie.plot }}</td>
    </tr>
  </tbody>
</table>
